<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Inter:wght@400;500;600&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Marcellus&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
  <style>
    html.intro-scroll-lock,
    html.intro-scroll-lock body {
      height: 100%;
      overflow: hidden !important;
      overscroll-behavior: none;
    }

    html.intro-scroll-lock #root {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
  </style>
  <script>
    (() => {
      try {
        if ("scrollRestoration" in window.history) {
          window.history.scrollRestoration = "manual";
        }

        const navigationEntry = window.performance?.getEntriesByType("navigation")?.[0];
        const shouldShowIntro =
          !window.sessionStorage.getItem("hasSeenIntro") || navigationEntry?.type === "reload";

        if (shouldShowIntro) {
          document.documentElement.classList.add("intro-scroll-lock");
          window.scrollTo(0, 0);
        }
      } catch {
        document.documentElement.classList.add("intro-scroll-lock");
      }
    })();
  </script>
  <title>Ayswariya Mahal - Luxury Wedding Palace</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
